<div class="container mt-4">

  <div class="d-flex justify-content-between align-items-center mb-3">
    <h2>📡 Live Order Status</h2>

    <!-- <a routerLink="/create" class="btn btn-success">
      ➕ Create Order
    </a> -->
  </div>
  <div class="card">
    <div class="card-body">

      <table class="table table-bordered table-hover">
        <thead class="table-light">
          <tr>
            <th>Order ID</th>
            <th>Status</th>
          </tr>
        </thead>

        <tbody>
          @for (order of getNotificationList() ; track order.orderId;){
          <tr>

            <td>{{ order.orderId }}</td>

            <td>
              <span class="badge"
                [ngClass]="{
                  'bg-success': order.orderStatus === 'SENT',
                  'bg-danger': order.orderStatus === 'FAILED',
                  'bg-warning text-dark': order.orderStatus === 'PENDING'
                }">
                {{ order.orderStatus }}
              </span>
            </td>

          </tr>
          }
        </tbody>

      </table>

    </div>
  </div>

</div>
