<h2>📡 Live Dashboard</h2>

<!-- 🚀 Navigation Button -->
<button routerLink="/create">
  ➕ Create New Order
</button>

<br><br>


<table border="1">
  <tr>
    <th>Order ID</th>
    <th>Status</th>
  </tr>

  <tr *ngFor="let order of getOrderList()">
    <td>{{ order?.orderId }}</td>
    <td [ngStyle]="{
        color: order.orderStatus === 'FAILED' ? 'red' :
               order.orderStatus === 'SENT' ? 'green' : 'orange'
      }">
      {{ order.orderStatus }}
    </td>
  </tr>
</table>
