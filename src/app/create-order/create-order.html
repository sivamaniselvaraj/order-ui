<div class="container mt-4">

  <!-- Items Card -->
  <h2 class="mb-4">🛒 Item List</h2>

  <div class="row">
    <div class="col-md-4" *ngFor="let item of items">
      
      <div class="card mb-4 shadow-sm h-100">
        
        <img 
          [src]="item.image" 
          class="card-img-top" 
          alt="{{ item.name }}"
        >

        <div class="card-body d-flex flex-column">
          <h5 class="card-title">{{ item.name }}</h5>

          <p class="card-text text-muted">
            {{ item.description | slice:0:80 }}...
          </p>

          <h6 class="mt-auto text-primary">
            ₹{{ item.price }}
          </h6>

          <button class="btn btn-outline-primary mt-2" (click)="addToCart(item)">
            Add to Cart
          </button>
        </div>

      </div>

    </div>
  </div>
