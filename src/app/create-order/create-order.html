<h2>Create Order</h2>

<form [formGroup]="orderForm" (submit)="createOrder();">
    <label>User ID:</label>
    <input class="form-control" name="userId" formControlName="userId" type="number" /><br><br>

    <label>Total Amount:</label>
    <input class="form-control" formControlName="totalAmount" type="number" /><br><br>

    <label>Currency:</label>
    <input class="form-control" formControlName="currency" type="text" /><br><br>

    <button type="submit">Create</button>

</form>
<p>{{ response }}</p>
